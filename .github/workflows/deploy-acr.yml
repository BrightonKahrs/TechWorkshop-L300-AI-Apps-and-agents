name: Build and Push to ACR

on:
  push:
    branches: [main]
    paths: ['src/**']
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Validate ACR login server secret
        run: |
          if [ -z "${{ secrets.ACR_LOGIN_SERVER }}" ]; then
            echo "ACR_LOGIN_SERVER is empty or missing"
            exit 1
          fi

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Write .env file
        run: echo "${{ secrets.ENV }}" > src/.env

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: src
          file: src/Dockerfile
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/techworkshop-app:latest

      - name: Clean up .env file
        if: always()
        run: rm -f src/.env
